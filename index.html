<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Alyte Universe</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: #000; overflow-x: hidden; }

    /* HERO */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* BACKGROUND PARALLAX LAYER */
    .hero-bg {
      position: absolute;
      inset: -10%;
      background: url('ALYTE_HEROSHOT_BG.png') center center / cover no-repeat;
      will-change: transform;
      transition: transform 0.1s linear;
      z-index: 1;
    }

    /* DARK OVERLAY — left side lighter, right side darker for text */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.55) 45%,
        rgba(0,0,0,0.82) 100%
      );
      z-index: 2;
    }

    /* ALYTE PORTRAIT LAYER */
    .hero-alyte {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 100%;
      max-height: 100vh;
      width: auto;
      object-fit: contain;
      object-position: bottom left;
      z-index: 3;
      will-change: transform;
      transition: transform 0.05s linear;
      filter: drop-shadow(0 0 40px rgba(247,147,30,0.18));
    }

    /* CONTENT BLOCK */
    .hero-content {
      position: relative;
      z-index: 4;
      margin-left: auto;
      margin-right: 6vw;
      max-width: 560px;
      padding: 2rem;
    }

    /* EYEBROW */
    .eyebrow {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      color: #00aeef;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    /* HEADLINE */
    .headline {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.2rem, 4.5vw, 3.8rem);
      font-weight: 900;
      line-height: 1.1;
      color: #ffffff;
      text-shadow: 0 0 40px rgba(247,147,30,0.3);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .headline span {
      color: #f7931e;
    }

    /* SUBHEADLINE */
    .subheadline {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(1rem, 1.8vw, 1.25rem);
      font-weight: 300;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.08em;
      line-height: 1.6;
      margin-bottom: 0.6rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    .subheadline strong {
      color: #f7931e;
      font-weight: 600;
    }

    /* DEHUMANIZE CALLOUT */
    .release-tag {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: #00aeef;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.7s;
    }

    /* EMAIL FORM */
    .email-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.85s;
    }

    .email-form p {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    .email-row {
      display: flex;
      gap: 0;
      max-width: 420px;
    }

    .email-input {
      flex: 1;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(0,174,239,0.4);
      border-right: none;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .email-input::placeholder { color: rgba(255,255,255,0.3); }

    .email-input:focus {
      border-color: #00aeef;
      background: rgba(0,174,239,0.08);
    }

    .email-submit {
      padding: 0.75rem 1.25rem;
      background: #00aeef;
      border: 1px solid #00aeef;
      color: #000;
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .email-submit:hover {
      background: #f7931e;
      border-color: #f7931e;
      color: #000;
    }

    /* CTA BUTTON */
    .cta-btn {
      display: inline-block;
      padding: 0.9rem 2.2rem;
      border: 1px solid #f7931e;
      color: #f7931e;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      background: transparent;
      transition: background 0.25s, color 0.25s, box-shadow 0.25s;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
    }

    .cta-btn:hover {
      background: #f7931e;
      color: #000;
      box-shadow: 0 0 30px rgba(247,147,30,0.4);
    }

    /* AMBIENT GLOW */
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 2;
      pointer-events: none;
    }
    .glow-amber {
      width: 400px; height: 400px;
      background: rgba(247,147,30,0.12);
      bottom: -100px; left: 15%;
    }
    .glow-blue {
      width: 300px; height: 300px;
      background: rgba(0,174,239,0.1);
      top: 20%; right: 10%;
    }

    /* SCROLL INDICATOR */
    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.5s;
    }
    .scroll-hint span {
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
    }
    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(0,174,239,0.6), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; transform: scaleY(1); }
      50%       { opacity: 1;   transform: scaleY(1.2); }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero-alyte { height: 70%; opacity: 0.4; }
      .hero-content { margin: 0 auto; padding: 1.5rem; text-align: center; }
      .email-row { flex-direction: column; }
      .email-input { border-right: 1px solid rgba(0,174,239,0.4); border-bottom: none; }
      .email-submit { padding: 0.75rem; }
      .hero-overlay {
        background: rgba(0,0,0,0.65);
      }
    }
  </style>
</head>
<body>

<section class="hero">
  <!-- Background -->
  <div class="hero-bg" id="heroBg"></div>

  <!-- Ambient glows -->
  <div class="glow-orb glow-amber"></div>
  <div class="glow-orb glow-blue"></div>

  <!-- Overlay -->
  <div class="hero-overlay"></div>

  <!-- Alyte portrait -->
  <img class="hero-alyte" id="heroAlyte" src="ALYTE_HEROSHOT_FB.png" alt="Alyte">

  <!-- Content -->
  <div class="hero-content">
    <p class="eyebrow">Welcome to Cartesia</p>

    <h1 class="headline">The <span>Alyte</span><br>Universe</h1>

    <p class="subheadline">Music. Fiction. Lore.<br>A cyberpunk world where echoes have souls.</p>

    <p class="release-tag">DEHUMANIZE — STREAMING APRIL 1ST</p>

    <!-- Email Capture -->
    <div class="email-form">
      <p>Enter the universe — get updates from Alyte</p>
      <!-- MAILCHIMP: replace action URL when ready -->
      <form class="email-row" action="#" method="post">
        <input class="email-input" type="email" name="EMAIL" placeholder="your@email.com" required>
        <button class="email-submit" type="submit">Join</button>
      </form>
    </div>

    <a href="#" class="cta-btn">Cross The Meridian</a>
  </div>

  <!-- Scroll hint -->
  <div class="scroll-hint">
    <div class="scroll-line"></div>
    <span>Scroll</span>
  </div>
</section>

<script>
  // Parallax on mouse move
  const bg = document.getElementById('heroBg');
  const alyte = document.getElementById('heroAlyte');

  document.addEventListener('mousemove', e => {
    const x = (e.clientX / window.innerWidth - 0.5);
    const y = (e.clientY / window.innerHeight - 0.5);
    bg.style.transform = `translate(${x * -18}px, ${y * -12}px) scale(1.1)`;
    alyte.style.transform = `translate(${x * 8}px, ${y * 4}px)`;
  });

  // Parallax on scroll
  window.addEventListener('scroll', () => {
    const s = window.scrollY;
    bg.style.transform = `translateY(${s * 0.4}px) scale(1.1)`;
  });
</script>

</body>
</html>
